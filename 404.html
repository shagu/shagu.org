<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        const githubUser = "shagu";
        const path = window.location.pathname;
        const target = "https://github.com" + githubUser + path;
        window.location.replace(target);
    </script>
</head>
<body>
    <p>Redirecting to <a id="link" href="#">GitHub...</a></p>
    <script>
        document.getElementById("link").href = "https://github.com" + githubUser + window.location.pathname;
    </script>
</body>
</html>
